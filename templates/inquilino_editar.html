<!-- templates/inquilino_editar.html -->
{% extends "base.html" %}
{% block title %}Editar Inquilino | CREDIMAS{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Inquilino #{{ i.id }}</h1>
    <p class="page-subtitle">Actualiza datos del cliente</p>
  </div>
  <a class="btn btn-soft" href="/inquilinos"><i class="bi bi-arrow-left me-1"></i> Volver</a>
</div>

<div class="card-pro">
  <div class="card-header"><i class="bi bi-people-fill me-2"></i>Edición</div>
  <div class="card-body">
    <form class="row g-3" action="/inquilinos/{{i.id}}/actualizar" method="post">
      <div class="col-md-3">
        <label class="form-label">DNI</label>
        <input class="form-control" name="dni" value="{{i.dni}}" required>
      </div>
      <div class="col-md-5">
        <label class="form-label">Nombre completo</label>
        <input class="form-control" name="nombre" value="{{i.nombre}}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Teléfono</label>
        <input class="form-control" name="telefono" value="{{i.telefono}}">
      </div>
      <div class="col-md-2">
        <label class="form-label">WhatsApp</label>
        <input class="form-control" name="whatsapp" value="{{i.whatsapp}}">
      </div>

      <div class="col-md-3">
        <label class="form-label">Estado</label>
        <select class="form-select" name="estado">
          <option value="Activo" {% if i.estado=="Activo" %}selected{% endif %}>Activo</option>
          <option value="Inactivo" {% if i.estado!="Activo" %}selected{% endif %}>Inactivo</option>
        </select>
      </div>

      <div class="col-12 d-flex justify-content-end gap-2">
        <button class="btn btn-credimas" type="submit"><i class="bi bi-check2-circle me-1"></i> Guardar</button>
        <a class="btn btn-soft" href="/inquilinos"><i class="bi bi-x-circle me-1"></i> Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
