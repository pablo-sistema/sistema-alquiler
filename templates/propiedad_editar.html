<!-- templates/propiedad_editar.html -->
{% extends "base.html" %}
{% block title %}Editar Propiedad | CREDIMAS{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Propiedad #{{ p.id }}</h1>
    <p class="page-subtitle">Actualiza datos de la propiedad</p>
  </div>
  <a class="btn btn-soft" href="/propiedades"><i class="bi bi-arrow-left me-1"></i> Volver</a>
</div>

<div class="card-pro">
  <div class="card-header"><i class="bi bi-house-gear me-2"></i>Edición</div>
  <div class="card-body">
    <form class="row g-3" action="/propiedades/{{p.id}}/actualizar" method="post">
      <div class="col-md-4">
        <label class="form-label">Tipo</label>
        <input class="form-control" name="tipo" value="{{p.tipo}}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Número / Código</label>
        <input class="form-control" name="numero" value="{{p.numero}}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Precio (S/)</label>
        <input class="form-control" type="number" step="0.01" min="0" name="precio" value="{{p.precio}}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Estado</label>
        <select class="form-select" name="estado" required>
          <option value="libre" {% if p.estado=="libre" %}selected{% endif %}>Libre</option>
          <option value="ocupado" {% if p.estado=="ocupado" %}selected{% endif %}>Ocupado</option>
        </select>
      </div>

      <div class="col-12 d-flex justify-content-end gap-2">
        <button class="btn btn-credimas" type="submit"><i class="bi bi-check2-circle me-1"></i> Guardar</button>
        <a class="btn btn-soft" href="/propiedades"><i class="bi bi-x-circle me-1"></i> Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
