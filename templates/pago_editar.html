{% extends "base.html" %}
{% block title %}Editar Pago | CREDIMAS{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Pago #{{ pago.id }}</h1>
    <p class="page-subtitle">Modificar monto, fecha o método del pago aplicado</p>
  </div>
</div>

<div class="card-pro">
  <div class="card-header"><i class="bi bi-pencil-square me-2"></i>Edición</div>
  <div class="card-body">
    <form class="row g-3" action="/pagos/{{pago.id}}/actualizar" method="post">
      <div class="col-md-4">
        <label class="form-label">Inquilino</label>
        <input class="form-control" value="{{ pago.contrato.inquilino.nombre }}" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label">Cargo</label>
        <input class="form-control" value="{{ pago.cargo.concepto if pago.cargo else '-' }} | {{ pago.cargo.periodo if pago.cargo else '-' }}" readonly>
      </div>

      <div class="col-md-2">
        <label class="form-label">Monto (S/)</label>
        <input class="form-control" type="number" step="0.01" min="0" name="monto" value="{{ pago.monto }}" required>
      </div>

      <div class="col-md-2">
        <label class="form-label">Fecha</label>
        <input class="form-control" type="date" name="fecha_pago" value="{{ pago.fecha_pago }}" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Método</label>
        <select class="form-select" name="metodo" required>
          {% set m = pago.metodo %}
          <option value="Efectivo" {% if m=="Efectivo" %}selected{% endif %}>Efectivo</option>
          <option value="Yape" {% if m=="Yape" %}selected{% endif %}>Yape</option>
          <option value="Plin" {% if m=="Plin" %}selected{% endif %}>Plin</option>
          <option value="Transferencia" {% if m=="Transferencia" %}selected{% endif %}>Transferencia</option>
          <option value="Otro" {% if m=="Otro" %}selected{% endif %}>Otro</option>
        </select>
      </div>

      <div class="col-12 d-flex justify-content-end gap-2">
        <a class="btn btn-soft" href="/pagos"><i class="bi bi-arrow-left me-1"></i> Volver</a>
        <button class="btn btn-credimas" type="submit"><i class="bi bi-check2-circle me-1"></i> Guardar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
