<!-- templates/cargo_editar.html -->
{% extends "base.html" %}
{% block title %}Editar Cargo | CREDIMAS{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Cargo #{{ cargo.id }}</h1>
    <p class="page-subtitle">Actualiza concepto/periodo/monto/vencimiento</p>
  </div>
  <a class="btn btn-soft" href="/cargos"><i class="bi bi-arrow-left me-1"></i> Volver</a>
</div>

<div class="card-pro">
  <div class="card-header"><i class="bi bi-receipt me-2"></i>Edición</div>
  <div class="card-body">
    <form class="row g-3" action="/cargos/{{cargo.id}}/actualizar" method="post">
      <div class="col-md-5">
        <label class="form-label">Contrato</label>
        <select class="form-select" name="contrato_id" required>
          {% for c in contratos %}
            <option value="{{c.id}}" {% if c.id==cargo.contrato_id %}selected{% endif %}>
              #{{c.id}} | {{c.inquilino.nombre}} ({{c.inquilino.dni}}) | {{c.propiedad.tipo}} {{c.propiedad.numero}}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label">Concepto</label>
        <input class="form-control" name="concepto" value="{{cargo.concepto}}" required>
      </div>

      <div class="col-md-2">
        <label class="form-label">Periodo</label>
        <input class="form-control" name="periodo" value="{{cargo.periodo}}" required>
      </div>

      <div class="col-md-2">
        <label class="form-label">Monto (S/)</label>
        <input class="form-control" type="number" step="0.01" min="0" name="monto" value="{{cargo.monto}}" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Vencimiento</label>
        <input class="form-control" type="date" name="vencimiento" value="{{cargo.vencimiento}}" required>
      </div>

      <div class="col-12 d-flex justify-content-end gap-2">
        <button class="btn btn-credimas" type="submit"><i class="bi bi-check2-circle me-1"></i> Guardar</button>
        <a class="btn btn-soft" href="/cargos"><i class="bi bi-x-circle me-1"></i> Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
